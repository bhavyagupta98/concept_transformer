apiVersion: batch/v1
kind: Job
metadata:
  name: kg-coop-ct-rebuild-scaling
  labels:
    app: kg-coop-ct-rebuild-scaling
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: kg-coop-ct-rebuild-scaling
    spec:
      restartPolicy: Never
      tolerations:
        - key: nautilus.io/reservation
          operator: Exists
          effect: NoSchedule
        - effect: PreferNoSchedule
          key: nvidia.com/gpu
          operator: Exists
        - key: nautilus.io/issue
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-A10
                      - NVIDIA-RTX-A6000
                      - NVIDIA-A100-SXM4-80GB
      containers:
        - name: ct-runner
          image: pytorch/pytorch:2.2.0-cuda11.8-cudnn8-runtime
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              set -e
              apt-get update && apt-get install -y git
              if [ ! -d /workspace/concept_transformer ]; then
                if [ -n "${GIT_REPO:-}" ]; then
                  echo "Cloning ${GIT_REPO} to /workspace/concept_transformer..."
                  cd /workspace && git clone "${GIT_REPO}" concept_transformer
                fi
              fi
              cd /workspace/concept_transformer
              echo "Repository ready at /workspace/concept_transformer"
              if [ ! -d venv ]; then
                echo "venv not found at /workspace/concept_transformer/venv"
                echo "Run scripts/setup.sh once to create it on the PVC, then rerun this Job."
                exit 1
              fi
              . venv/bin/activate
              mkdir -p /workspace/concept_transformer/experiments
              echo "Rebuilding scaling JSON from checkpoints..."
              PYTHONPATH=/workspace/concept_transformer python scripts/rebuild_scaling_json.py \
                --runs_root /workspace/concept_transformer/binary_mnist_scaling_ES \
                --output_json /workspace/concept_transformer/experiments/binary_mnist_scaling_ES.json
              echo "Plotting Figure 2..."
              PYTHONPATH=/workspace/concept_transformer python scripts/generate_figures.py \
                --skip_examples \
                --scaling_json /workspace/concept_transformer/experiments/binary_mnist_scaling_ES.json \
                --output_dir /workspace/data/figs \
                --scaling_lambdas 0.0,2.0
              echo "Job complete"
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: 1
          env:
            - name: CUDA_VERSION
              value: "11.8"
            - name: GIT_REPO
              value: "https://github.com/bhavyagupta98/concept_transformer.git"
            - name: DATA_ROOT
              value: "/workspace/data"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: bgupta-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
