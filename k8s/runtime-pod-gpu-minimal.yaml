apiVersion: v1
kind: Pod
metadata:
  name: concept-transformer-gpu-runner
  labels:
    app: concept-transformer
spec:
  restartPolicy: Never
  containers:
    - name: ct-runner
      image: pytorch/pytorch:2.2.0-cuda11.8-cudnn8-runtime
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          set -euo pipefail
          # Clone repo if needed
          if [ ! -d /workspace/.git ]; then
            if [ -n "${GIT_REPO:-}" ]; then
              echo "Cloning ${GIT_REPO}..."
              git clone "${GIT_REPO}" /workspace
            fi
          fi
          cd /workspace
          chmod +x scripts/setup.sh scripts/driver.sh 2>/dev/null || true
          /workspace/scripts/setup.sh
      resources:
        limits:
          nvidia.com/gpu: 1
      env:
        - name: CUDA_VERSION
          value: "11.8"
        - name: RUN_DRIVER
          value: "1"
        - name: GIT_REPO
          value: "https://github.com/bhavyagupta98/concept_transformer.git"
        - name: RUN_MNIST
          value: "1"
        - name: RUN_CUB
          value: "0"
        - name: RUN_SCALING
          value: "0"
      volumeMounts:
        - name: workspace
          mountPath: /workspace

  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: bgupta-pvc
